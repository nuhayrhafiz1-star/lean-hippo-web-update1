<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base grid, architectural rhythm" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--lh-black); font-family:var(--font-body); padding:26px; }
  .scale { display:flex; align-items:flex-end; gap:14px; }
  .item { text-align:left; }
  .bar { background:linear-gradient(180deg,#1F5EFF,#123B9F); border-radius:2px; width:26px; }
  .n { color:var(--text-primary); font-family:var(--font-mono); font-size:11px; margin-top:8px; }
  .px { color:var(--text-muted); font-family:var(--font-mono); font-size:10px; }
</style>
</head>
<body>
  <div class="scale">
    <div class="item"><div class="bar" style="height:8px"></div><div class="n">2</div><div class="px">8</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="n">3</div><div class="px">12</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="n">4</div><div class="px">16</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="n">6</div><div class="px">24</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="n">8</div><div class="px">32</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="n">12</div><div class="px">48</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="n">16</div><div class="px">64</div></div>
    <div class="item"><div class="bar" style="height:80px"></div><div class="n">20</div><div class="px">80</div></div>
  </div>
</body>
</html>
