<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--lh-black); font-family:var(--font-body); padding:24px; }
  .row { display:flex; gap:18px; }
  .tile { flex:1; height:180px; border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:center; border:1px solid var(--border-default); }
  .tile img { height:128px; }
  .b1 { background:var(--lh-black); }
  .b2 { background:var(--lh-charcoal); }
  .b3 { background:linear-gradient(135deg,#1F5EFF,#123B9F); border-color:transparent; }
  .b4 { background:var(--lh-white); }
  .cap { color:var(--text-muted); font-family:var(--font-mono); font-size:10px; text-align:center; margin-top:8px; letter-spacing:0.06em; }
</style>
</head>
<body>
  <div class="row">
    <div style="flex:1"><div class="tile b1"><img src="../assets/logos/leanhippo-white.png" alt="LeanHippo"></div><div class="cap">Core black</div></div>
    <div style="flex:1"><div class="tile b2"><img src="../assets/logos/leanhippo-white.png" alt="LeanHippo"></div><div class="cap">Charcoal</div></div>
    <div style="flex:1"><div class="tile b3"><img src="../assets/logos/leanhippo-white.png" alt="LeanHippo"></div><div class="cap">Cobalt</div></div>
    <div style="flex:1"><div class="tile b4"><img src="../assets/logos/leanhippo-charcoal.png" alt="LeanHippo"></div><div class="cap">Soft white</div></div>
  </div>
</body>
</html>
