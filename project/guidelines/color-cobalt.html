<!-- @dsCard group="Colors" viewport="700x205" name="Cobalt accent" subtitle="The single technology accent — pale → deep" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--lh-black); font-family:var(--font-body); padding:22px; }
  .row { display:flex; gap:14px; }
  .sw { flex:1; }
  .chip { height:78px; border-radius:var(--radius-md); border:1px solid var(--border-default); }
  .lit { box-shadow:var(--glow-md), var(--shadow-edge-cobalt); }
  .name { color:var(--text-primary); font-size:12px; font-weight:500; margin-top:10px; }
  .hex { color:var(--text-muted); font-family:var(--font-mono); font-size:11px; margin-top:3px; }
  .role { color:var(--lh-cobalt-100); font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; margin-bottom:14px; }
</style>
</head>
<body>
  <div class="role">Cobalt · primary technology accent</div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#AFC7FF"></div><div class="name">Pale system</div><div class="hex">#AFC7FF</div></div>
    <div class="sw"><div class="chip" style="background:#6E97FF"></div><div class="name">Cobalt 300</div><div class="hex">#6E97FF</div></div>
    <div class="sw"><div class="chip lit" style="background:#1F5EFF"></div><div class="name">Cobalt 500</div><div class="hex">#1F5EFF</div></div>
    <div class="sw"><div class="chip" style="background:#1A4FE0"></div><div class="name">Cobalt 600</div><div class="hex">#1A4FE0</div></div>
    <div class="sw"><div class="chip" style="background:#123B9F"></div><div class="name">Deep cobalt</div><div class="hex">#123B9F</div></div>
    <div class="sw"><div class="chip" style="background:#0B2358"></div><div class="name">Cobalt 900</div><div class="hex">#0B2358</div></div>
  </div>
</body>
</html>
