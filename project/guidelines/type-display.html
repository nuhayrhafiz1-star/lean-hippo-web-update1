<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--lh-black); font-family:var(--font-display); padding:28px; color:var(--text-primary); }
  .meta { color:var(--text-muted); font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; margin-bottom:6px; }
  .d-xxl { font-size:72px; font-weight:200; letter-spacing:-0.025em; line-height:1.0; }
  .d-md { font-size:40px; font-weight:200; letter-spacing:-0.02em; line-height:1.05; margin-top:18px; }
  .d-sm { font-size:26px; font-weight:300; letter-spacing:-0.012em; margin-top:18px; }
</style>
</head>
<body>
  <div class="meta">Display XXL · 112 / 200 · -0.025em</div>
  <div class="d-xxl">We build the systems<br>businesses run on.</div>
  <div class="meta" style="margin-top:22px;">Display MD · 48 / 200</div>
  <div class="d-md">Every system has four layers.</div>
</body>
</html>
