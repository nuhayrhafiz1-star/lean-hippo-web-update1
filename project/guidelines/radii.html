<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--lh-black); font-family:var(--font-body); padding:26px; }
  .row { display:flex; gap:18px; align-items:flex-end; }
  .item { text-align:center; }
  .box { width:84px; height:84px; background:var(--surface-card); border:1px solid var(--border-strong); box-shadow:var(--shadow-edge); }
  .n { color:var(--text-primary); font-size:12px; font-weight:500; margin-top:10px; }
  .v { color:var(--text-muted); font-family:var(--font-mono); font-size:10px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:2px"></div><div class="n">xs</div><div class="v">2px</div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="n">sm</div><div class="v">4px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="n">md</div><div class="v">8px</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="n">lg</div><div class="v">12px</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="n">xl</div><div class="v">16px</div></div>
    <div class="item"><div class="box" style="border-radius:999px;width:84px"></div><div class="n">pill</div><div class="v">999px</div></div>
  </div>
</body>
</html>
