<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--lh-black); font-family:var(--font-body); padding:26px; display:flex; align-items:center; gap:40px; }
  .marks { display:flex; align-items:flex-end; gap:28px; }
  .marks img { display:block; }
  .lbl { color:var(--text-muted); font-family:var(--font-mono); font-size:10px; text-align:center; margin-top:10px; }
  .divider { width:1px; align-self:stretch; background:var(--border-default); }
  .swatchrow { display:flex; gap:20px; align-items:center; }
  .sgroup { text-align:center; }
</style>
</head>
<body>
  <div class="marks">
    <div class="sgroup"><img src="../assets/logos/leanhippo-mark-white.png" style="height:48px"><div class="lbl">48</div></div>
    <div class="sgroup"><img src="../assets/logos/leanhippo-mark-white.png" style="height:80px"><div class="lbl">80</div></div>
    <div class="sgroup"><img src="../assets/logos/leanhippo-mark-white.png" style="height:120px"><div class="lbl">120</div></div>
  </div>
  <div class="divider"></div>
  <div class="swatchrow">
    <div class="sgroup"><img src="../assets/logos/leanhippo-mark-cobalt.png" style="height:96px"><div class="lbl">Cobalt</div></div>
    <div class="sgroup" style="background:linear-gradient(135deg,#1F5EFF,#123B9F);padding:18px;border-radius:12px"><img src="../assets/logos/leanhippo-mark-white.png" style="height:96px"><div class="lbl" style="color:#AFC7FF">On cobalt</div></div>
  </div>
</body>
</html>
