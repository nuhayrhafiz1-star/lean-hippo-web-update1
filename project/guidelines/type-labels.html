<!-- @dsCard group="Type" viewport="700x250" name="Labels & mono" subtitle="Tracked eyebrows and JetBrains Mono for data" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--lh-black); font-family:var(--font-body); padding:28px; color:var(--text-primary); }
  .meta { color:var(--text-muted); font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; margin-bottom:18px; }
  .eyebrow { color:var(--lh-cobalt-100); font-size:12px; font-weight:400; letter-spacing:0.18em; text-transform:uppercase; }
  .eyebrow-xl { color:var(--text-primary); font-size:14px; font-weight:400; letter-spacing:0.28em; text-transform:uppercase; margin-top:16px; }
  .mono { font-family:var(--font-mono); margin-top:24px; display:flex; gap:28px; flex-wrap:wrap; }
  .mono .k { color:var(--text-muted); font-size:11px; display:block; margin-bottom:4px; }
  .mono .v { color:var(--lh-cobalt-100); font-size:20px; font-weight:500; }
  .mono .u { color:var(--text-secondary); font-size:14px; }
</style>
</head>
<body>
  <div class="meta">Eyebrow / system label · 11–14 · 0.18–0.28em track</div>
  <div class="eyebrow">The Control Room · Visibility</div>
  <div class="eyebrow-xl">SYSTEM ARCHITECTURE</div>
  <div class="mono">
    <div><span class="k">ORG-ID</span><span class="v">LH-0042</span></div>
    <div><span class="k">UPTIME</span><span class="v">99.98<span class="u">%</span></span></div>
    <div><span class="k">NODES</span><span class="v">06 / 06</span></div>
    <div><span class="k">LATENCY</span><span class="v">14<span class="u">ms</span></span></div>
  </div>
</body>
</html>
