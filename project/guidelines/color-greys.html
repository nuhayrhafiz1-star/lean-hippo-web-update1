<!-- @dsCard group="Colors" viewport="700x190" name="Greys & text" subtitle="Technical grey ramp → soft white" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--lh-black); font-family:var(--font-body); padding:22px; }
  .row { display:flex; gap:14px; }
  .sw { flex:1; }
  .chip { height:88px; border-radius:var(--radius-md); border:1px solid var(--border-default); box-shadow:var(--shadow-edge); }
  .name { color:var(--text-primary); font-size:12px; font-weight:500; margin-top:10px; }
  .hex { color:var(--text-muted); font-family:var(--font-mono); font-size:11px; margin-top:3px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#3A404A"></div><div class="name">Slate 700</div><div class="hex">#3A404A</div></div>
    <div class="sw"><div class="chip" style="background:#4C535F"></div><div class="name">Slate 600</div><div class="hex">#4C535F</div></div>
    <div class="sw"><div class="chip" style="background:#6F7782"></div><div class="name">Technical grey</div><div class="hex">#6F7782</div></div>
    <div class="sw"><div class="chip" style="background:#8B939E"></div><div class="name">Grey 400</div><div class="hex">#8B939E</div></div>
    <div class="sw"><div class="chip" style="background:#AEB4BD"></div><div class="name">Grey 300</div><div class="hex">#AEB4BD</div></div>
    <div class="sw"><div class="chip" style="background:#F4F4F2"></div><div class="name">Soft white</div><div class="hex">#F4F4F2</div></div>
  </div>
</body>
</html>
