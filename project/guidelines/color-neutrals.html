<!-- @dsCard group="Colors" viewport="700x190" name="Core neutrals" subtitle="Black → charcoal canvas & surface ramp" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--lh-black); font-family:var(--font-body); padding:22px; }
  .row { display:flex; gap:14px; }
  .sw { flex:1; }
  .chip { height:88px; border-radius:var(--radius-md); border:1px solid var(--border-default); box-shadow:var(--shadow-edge); }
  .name { color:var(--text-primary); font-size:12px; font-weight:500; margin-top:10px; letter-spacing:0.01em; }
  .hex { color:var(--text-muted); font-family:var(--font-mono); font-size:11px; margin-top:3px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#050505"></div><div class="name">Core black</div><div class="hex">#050505</div></div>
    <div class="sw"><div class="chip" style="background:#0C0E11"></div><div class="name">Inset</div><div class="hex">#0C0E11</div></div>
    <div class="sw"><div class="chip" style="background:#111317"></div><div class="name">Graphite</div><div class="hex">#111317</div></div>
    <div class="sw"><div class="chip" style="background:#1C1F24"></div><div class="name">Charcoal</div><div class="hex">#1C1F24</div></div>
    <div class="sw"><div class="chip" style="background:#24282E"></div><div class="name">Raised</div><div class="hex">#24282E</div></div>
    <div class="sw"><div class="chip" style="background:#2D323A"></div><div class="name">Slate 800</div><div class="hex">#2D323A</div></div>
  </div>
</body>
</html>
